# fly.toml app configuration file generated for brew-buddy-auth
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "brew-buddy-auth"
primary_region = "lhr" # London - change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  SPRING_PROFILES_ACTIVE = "prod"
  # JWT Configuration
  JWT_EXPIRATION_MS = "3600000"
  JWT_REFRESH_EXPIRATION_MS = "604800000"
  JWT_ISSUER = "brew-buddy-auth"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/actuator/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Secrets to set via: fly secrets set KEY=VALUE
# Required secrets:
# - DB_URL (your Supabase PostgreSQL connection string)
# - DB_USERNAME (your database username)
# - DB_PASSWORD (your database password)
# - JWT_SECRET (secure 256-bit secret key, minimum 32 characters)
# - CORS_ALLOWED_ORIGINS (comma-separated list of allowed origins)
