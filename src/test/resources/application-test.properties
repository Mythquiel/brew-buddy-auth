# Test configuration
spring.application.name=brew-buddy-auth-test

# Server Configuration
server.port=0

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Configuration (test values)
jwt.secret=test-secret-key-for-testing-must-be-at-least-32-characters-long
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=86400000
jwt.issuer=brew-buddy-auth-test

# CORS Configuration (test values)
cors.allowed-origins=http://localhost:3000

# Admin User Configuration (test values)
app.admin.username=test-admin
app.admin.password=test-password
app.admin.email=test-admin@example.com

# Logging
logging.level.com.brewbuddy.auth=INFO
logging.level.org.springframework.security=INFO
